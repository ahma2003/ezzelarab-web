<script>
// Doctor pages use data-lang-* for content that's NOT in the global i18n dictionary
function applyDoctorLang(lang) {
  document.querySelectorAll('[data-lang-en]').forEach(el => {
    el.textContent = lang === 'ar' ? el.getAttribute('data-lang-ar') : el.getAttribute('data-lang-en');
  });
}
document.addEventListener('DOMContentLoaded', () => {
  const lang = localStorage.getItem('ezzelarab_lang') || 'ar';
  applyDoctorLang(lang);
  document.querySelectorAll('.lang-toggle').forEach(btn => {
    btn.addEventListener('click', () => {
      const newLang = document.documentElement.getAttribute('lang') === 'ar' ? 'en' : 'ar';
      applyDoctorLang(newLang);
    });
  });
});
</script>
